name: deploy lambdas

on:
  push:
    branches:
      - main
    paths:
      - backend/lambdas/**
      - .github/workflows/main.yml

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [getAllUsers, deleteUser, updateUserRole]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd backend/lambdas/${{ matrix.lambda }}
          npm ci

      - name: Run tests
        run: |
          cd backend/lambdas/${{ matrix.lambda }}
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [getAllUsers, deleteUser, updateUserRole]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd backend/lambdas/${{ matrix.lambda }}
          npm ci

      - name: Zip lambda
        run: |
          cd backend/lambdas/${{ matrix.lambda }}
          zip -r ../../../${{ matrix.lambda }}.zip .

      - name: Deploy
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: eu-west-1
          function_name: ${{ matrix.lambda }}
          zip_file: ${{ matrix.lambda }}.zip
